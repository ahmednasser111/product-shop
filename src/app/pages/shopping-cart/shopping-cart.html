<div class="max-w-4xl mx-auto space-y-4">
  <h2 class="text-2xl font-extrabold text-gray-900 dark:text-white mb-6">Shopping Cart</h2>

  <div class="grid grid-cols-1 gap-4">
    @for (prdQtyy of cartJoined().order.prdQtyList; track prdQtyy.prdId) {
      <div
        class="bg-white dark:bg-gray-800 p-5 rounded-2xl border border-gray-200 dark:border-gray-700 flex items-center justify-between shadow-sm hover:shadow-md transition-all"
      >
        <div class="flex items-center gap-5">
          <div
            class="h-12 w-12 bg-indigo-600/10 rounded-xl flex items-center justify-center text-indigo-600 font-bold"
          >
            <img [src]="prdQtyy.productDetails?.image" alt="Product Image" />
          </div>
          <div>
            <h3 class="font-bold text-gray-900 dark:text-white text-lg">
              Product Name: {{ prdQtyy.productDetails?.name }}
            </h3>
            <p class="text-gray-500 dark:text-gray-400 text-sm">
              Quantity requested:
              <input
                class="bg-slate-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-lg px-2 py-1 w-16 text-indigo-600 font-semibold focus:ring-2 focus:ring-indigo-500 outline-none"
                type="number"
                min="0"
                [max]="prdQtyy.productDetails!.stock"
                [ngModel]="prdQtyy.quantity"
                (ngModelChange)="updateQuantity($index, prdQtyy.prdId, $event)"
              />
            </p>
          </div>
        </div>

        <div class="flex flex-col items-center gap-2">
          <button
            routerLink="/products"
            class="bg-slate-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 px-4 py-2 rounded-xl font-medium hover:bg-indigo-600 hover:text-white transition-colors"
          >
            View Details
          </button>
          <button
            (click)="removeFromCart($index)"
            class="bg-slate-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 px-4 py-2 rounded-xl font-medium hover:bg-red-500 hover:text-white transition-colors"
          >
            Remove From Cart
          </button>
        </div>
      </div>
    } @empty {
      <div
        class="py-20 bg-white/50 dark:bg-gray-800/30 rounded-2xl border border-dashed border-gray-200 dark:border-gray-700 text-center italic text-gray-400"
      >
        Your cart is empty.
      </div>
    }
    <button
      routerLink="/checkout"
      class="bg-slate-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 px-4 py-2 rounded-xl font-medium hover:bg-indigo-600 hover:text-white transition-colors"
    >
      Proceed To Checkout
    </button>
  </div>
</div>
