<div class="bg-white p-10 rounded-2xl shadow-lg w-full max-w-md">
  <h1 class="text-2xl font-extrabold text-gray-900 mb-6">Create Account</h1>

  @if (error) {
    <p class="text-red-500 text-sm bg-red-50 px-4 py-3 rounded-xl mb-4">{{ error }}</p>
  }

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1">Name</label>
      <input
        type="text"
        formControlName="name"
        class="w-full border rounded-xl px-4 py-2 text-sm text-gray-700 outline-none"
        [class.border-red-400]="name.invalid && name.touched"
        [class.border-gray-200]="!(name.invalid && name.touched)"
      />
      @if (name.invalid && name.touched) {
        <p class="text-red-500 text-xs mt-1">Name is required</p>
      }
    </div>

    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1">Email</label>
      <input
        type="email"
        formControlName="email"
        class="w-full border rounded-xl px-4 py-2 text-sm text-gray-700 outline-none"
        [class.border-red-400]="email.invalid && email.touched"
        [class.border-gray-200]="!(email.invalid && email.touched)"
      />
      @if (email.invalid && email.touched) {
        <p class="text-red-500 text-xs mt-1">Valid email is required</p>
      }
    </div>

    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
      <input
        type="password"
        formControlName="password"
        class="w-full border rounded-xl px-4 py-2 text-sm text-gray-700 outline-none"
        [class.border-red-400]="password.invalid && password.touched"
        [class.border-gray-200]="!(password.invalid && password.touched)"
      />
      @if (password.invalid && password.touched) {
        <p class="text-red-500 text-xs mt-1">Min 6 characters</p>
      }
    </div>

    <div class="relative">
      <button
        type="button"
        (click)="isDropdownOpen = !isDropdownOpen"
        class="w-full flex items-center justify-between border rounded-xl px-4 py-2 text-sm text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors"
      >
        {{ role }}
        <svg
          class="w-4 h-4 ms-2 text-gray-500 transition-transform duration-200"
          [class.rotate-180]="isDropdownOpen"
          aria-hidden="true"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
        >
          <path
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="m19 9-7 7-7-7"
          />
        </svg>
      </button>

      @if (isDropdownOpen) {
        <div
          class="absolute z-10 w-full mt-2 bg-white rounded-xl shadow-lg border border-gray-100 overflow-hidden"
        >
          <ul class="py-1 text-sm text-gray-700">
            <li>
              <button
                type="button"
                (click)="setRole('user')"
                class="w-full text-left px-4 py-2 hover:bg-indigo-50 hover:text-indigo-600 transition-colors"
              >
                User
              </button>
            </li>
            <li>
              <button
                type="button"
                (click)="setRole('seller')"
                class="w-full text-left px-4 py-2 hover:bg-indigo-50 hover:text-indigo-600 transition-colors"
              >
                Seller
              </button>
            </li>
          </ul>
        </div>
      }
    </div>

    <button
      type="submit"
      [disabled]="isLoading"
      class="w-full bg-indigo-600 text-white py-2 rounded-xl font-semibold hover:bg-indigo-700 transition-colors disabled:opacity-50"
    >
      {{ isLoading ? 'Creating...' : 'Create Account' }}
    </button>
  </form>

  <p class="text-center text-sm text-gray-400 mt-6">
    Have an account? <a routerLink="/login" class="text-indigo-500 font-semibold">Sign in</a>
  </p>
</div>
