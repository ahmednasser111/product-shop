<div
  class="max-w-4xl mx-auto p-6 bg-white mt-4 dark:bg-gray-800 rounded-3xl shadow-sm border border-slate-100 dark:border-gray-700"
>
  <div class="mb-8 border-b border-slate-50 dark:border-gray-700 pb-4">
    <h2 class="text-2xl font-black text-slate-900 dark:text-white">Account Information</h2>
    <p class="text-slate-500 text-sm">Manage your personal details and account role.</p>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <div class="space-y-2">
      <label class="text-sm font-bold text-slate-700 dark:text-slate-300 ml-1">Full Name</label>
      <input
        type="text"
        [(ngModel)]="userUpdated.name"
        class="w-full px-4 py-3 bg-slate-50 dark:bg-gray-900 border border-slate-200 dark:border-gray-700 rounded-2xl text-slate-600 dark:text-slate-300 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 transition-all"
      />
    </div>

    <div class="space-y-2">
      <label class="text-sm font-bold text-slate-700 dark:text-slate-300 ml-1">Email Address</label>
      <input
        type="email"
        readonly
        [value]="authService.getUser()?.email"
        [(ngModel)]="userUpdated.email"
        class="w-full px-4 py-3 bg-slate-50 dark:bg-gray-900 border border-slate-200 dark:border-gray-700 rounded-2xl text-slate-600 dark:text-slate-300"
      />
    </div>

    <div class="space-y-2">
      <label class="text-sm font-bold text-slate-700 dark:text-slate-300 ml-1"
        >Shipping Address</label
      >
      <input
        type="text"
        [(ngModel)]="userUpdated.address"
        class="w-full px-4 py-3 bg-slate-50 dark:bg-gray-900 border border-slate-200 dark:border-gray-700 rounded-2xl text-slate-600 dark:text-slate-300"
      />
    </div>

    <div class="space-y-2">
      <label class="text-sm font-bold text-slate-700 dark:text-slate-300 ml-1">Account Role</label>
      <div class="relative">
        <input
          type="text"
          readonly
          [value]="authService.getUser()?.role"
          class="w-full px-4 py-3 bg-indigo-50/50 dark:bg-indigo-900/10 border border-indigo-100 dark:border-indigo-900/30 rounded-2xl text-indigo-700 dark:text-indigo-400 font-bold uppercase tracking-wider text-xs"
        />
        <span class="absolute right-4 top-1/2 -translate-y-1/2 text-indigo-400">🛡️</span>
      </div>
    </div>
  </div>

  <div class="mt-10 flex justify-end gap-3">
    <button
      routerLink="/profile-page"
      class="px-6 py-2.5 rounded-xl font-bold text-slate-500 hover:bg-slate-100 transition-all"
    >
      Cancel
    </button>
    <button
      (click)="onUpdate()"
      routerLink="/profile-page"
      class="px-6 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-bold shadow-lg shadow-indigo-200 dark:shadow-none transition-all"
    >
      Update Profile
    </button>
  </div>
</div>
